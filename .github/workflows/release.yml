name: Release

# Cut a release by pushing a version tag, e.g.:
#   npm version minor && git push --follow-tags
# Each platform builds on its native runner (so Windows NSIS needs no Wine)
# and electron-builder publishes the installers + update manifests
# (latest.yml / latest-mac.yml) to the GitHub Release for the tag.
on:
  push:
    tags:
      - "v*"

# The built-in GITHUB_TOKEN needs write access to create the release.
permissions:
  contents: write

jobs:
  # Create the GitHub release up front, once, before any platform builds.
  # electron-builder publishes its .dmg/.zip artifact groups in parallel, and
  # each group independently checks "does the release exist?" then creates it —
  # so two concurrent matrix jobs (or even two publishers within one job) race
  # to POST /releases and the loser dies with "422 already_exists". Creating it
  # here means every publisher finds an existing release and only uploads.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We don't sign yet; stop electron-builder from grabbing a random
          # keychain identity on the macOS runner.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bun run release
